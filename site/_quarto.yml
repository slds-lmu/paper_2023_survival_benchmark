project:
  type: website
  output-dir: _site
  preview:
    port: 4200
    browser: false

website:
  title: "Burk et al. (2025)"
  reader-mode: false
  repo-url: https://github.com/slds-lmu/paper_2023_survival_benchmark
  repo-actions: [issue]
  page-navigation: true
  sidebar:
    style: docked
    search: true
    tools:
      - icon: github
        href: https://github.com/slds-lmu/paper_2023_survival_benchmark
        text: GitHub
      - icon: file-earmark-text
        href: https://arxiv.org/abs/2406.04098
        text: Preprint
    contents:
      - href: index.qmd
        text: Home
      - section: Results
        contents:
          - href: results.qmd
            text: Aggregated Results
          - href: scores.qmd
            text: Per-Dataset Scores
          - href: sensitivity.qmd
            text: Sensitivity Analysis
          - href: errors.qmd
            text: Errors
      - section: Metadata
        contents:
          - href: metadata.qmd
            text: Models, Data, Measures
  # navbar:
  #   right:
  #     - href: https://github.com/slds-lmu/paper_2023_survival_benchmark
  #       icon: github
  #     - href: https://arxiv.org/abs/2406.04098
  #       icon: file-earmark-text

format:
  html:
    code-fold: true
    toc: true
    toc-depth: 4
    embed-resources: false
    fig-align: center
    number-sections: false
    last-modified: last-modified
    theme:
      light: flatly
      dark: darkly
lightbox: true

execute:
  freeze: auto  # re-render only when source changes
